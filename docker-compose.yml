services:

  # ── Reverse proxy + WAF ──────────────────────────────────────────────────────
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - chakula_net
    depends_on:
      chakula_api:
        condition: service_healthy

  # ── Public API ───────────────────────────────────────────────────────────────
  chakula_api:
    image: mosesmbadi/chakula_api:latest
    container_name: chakula_api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CHAKULA_API_KEY: ${CHAKULA_API_KEY}
    # No public port — only reachable through Caddy inside chakula_net
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chakula_net

  # ── Internal knowledge base (not exposed publicly) ───────────────────────────
  chakula_knowledge_base:
    image: mosesmbadi/chakula_knowledge_base:latest
    container_name: chakula_knowledge_base
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      CHAKULA_API_KEY: ${CHAKULA_API_KEY}
    # No public port — only reachable by chakula_api inside chakula_net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chakula_net

networks:
  chakula_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
