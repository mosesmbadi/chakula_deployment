services:
  # ── Reverse proxy + WAF ──────────────────────────────────────────────────────
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - chakula_net

  redis:
    image: redis:7-alpine
    container_name: chakula_redis_local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata_local:/data
    networks:
      - chakula_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Public API ───────────────────────────────────────────────────────────────
  chakula_api:
    image: mosesmbadi/chakula_api:latest
    container_name: chakula_api
    restart: unless-stopped
    env_file:
      - .env
    # No public port — only reachable through Caddy inside chakula_net
    expose:
      - "3000"
    networks:
      - chakula_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Landing page ─────────────────────────────────────────────────────────────
  chakula_landing:
    image: mosesmbadi/chakula_landing:latest
    container_name: chakula_landing
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - chakula_net

  # ── Internal knowledge base (not exposed publicly) ───────────────────────────
  chakula_knowledge_base:
    image: mosesmbadi/chakula_knowledge_base:latest
    pull_policy: always
    container_name: chakula_knowledge_base
    restart: unless-stopped
    env_file:
      - .env
    # No public port — only reachable by chakula_api inside chakula_net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chakula_net
    extra_hosts:
      - "host.docker.internal:host-gateway"      

networks:
  chakula_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
  redisdata_local:
